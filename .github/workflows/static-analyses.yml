name: Run static analyses

on:
  push:
  workflow_dispatch:

jobs:
  lint:
    name: Lint source with Ruff
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Run ruff check
        uses: astral-sh/ruff-action@v3
        with:
          version: latest
      - name: Run ruff format
        run: ruff format --diff

  type-check:
    name: Type-check with Pyright
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        source-root:
          - src/zyncio
          - tests
        include:
          - source-root: tests
            dependency-group: --group test
          - python-version: "3.14"
            source-root: docs
            dependency-group: --group docs
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.6"
      - name: Set up virtual environment with Python ${{ matrix.python-version }}
        run: uv venv --python ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync ${{ matrix.dependency-group }}
      - name: Run Pyright
        run: uvx pyright@latest --pythonpath="$(uv run which python3)" --stats ${{ matrix.source-root }}
